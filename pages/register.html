<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Register</title>

    <link rel="stylesheet"
          href="../css/main.css">

</head>

<body>

    <div class="auth-container">

        <h1>Create Account</h1>

        <form id="registerForm">

            <input type="text"
                   id="registerName"
                   placeholder="Enter Name"
                   required>

            <input type="email"
                   id="registerEmail"
                   placeholder="Enter Email"
                   required>

            <input type="password"
                   id="registerPassword"
                   placeholder="Enter Password"
                   required>

            <button type="submit"
                    class="primary-btn">
                Register
            </button>

        </form>

    </div>

    <script type="module"
            src="../js/auth/auth.js">
    </script>

</body>

</html>
